<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Live Interpreter</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: linear-gradient(145deg, #080d1a 0%, #0e1525 55%, #080d1a 100%);
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #e2eaff; display: flex; flex-direction: column;
  }
  #header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    background: rgba(255,255,255,0.025);
  }
  .app-title-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .app-icon {
    width: 38px; height: 38px; border-radius: 10px;
    background: linear-gradient(135deg, #388bfd, #1a5ccc);
    display: flex; align-items: center; justify-content: center; font-size: 20px;
    box-shadow: 0 4px 14px rgba(56,139,253,0.4);
  }
  .app-name { font-size: 17px; font-weight: 700; color: #e8f0ff; }
  .app-sub  { font-size: 10px; color: #3d5070; letter-spacing: 1.5px; margin-top: 2px; }
  .lang-bar { display: flex; align-items: center; gap: 8px; }
  .lang-picker { position: relative; flex: 1; }
  .lang-btn {
    width: 100%; display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.07); border: 1.5px solid rgba(255,255,255,0.18);
    border-radius: 12px; padding: 10px 14px; cursor: pointer;
    color: #f0f4ff; font-family: inherit; text-align: left; transition: all 0.15s;
  }
  .lang-btn:hover, .lang-btn.open { background: rgba(255,255,255,0.13); }
  .lang-btn-native { font-size: 14px; font-weight: 600; line-height: 1; color: #f0f4ff; }
  .lang-btn-en { font-size: 10px; opacity: 0.55; letter-spacing: 1px; margin-top: 2px; }
  .lang-menu {
    position: absolute; top: calc(100% + 8px); left: 0; width: 190px;
    background: #151b2e; border: 1px solid rgba(255,255,255,0.14);
    border-radius: 14px; overflow: hidden; z-index: 999;
    box-shadow: 0 12px 40px rgba(0,0,0,0.6); display: none;
  }
  .lang-menu.right { left: auto; right: 0; }
  .lang-menu.show  { display: block; }
  .lang-opt {
    display: flex; align-items: center; gap: 10px; padding: 11px 16px; cursor: pointer;
    border-left: 3px solid transparent; color: #e2eaff; transition: background 0.1s;
  }
  .lang-opt:hover    { background: rgba(255,255,255,0.07); }
  .lang-opt.selected { background: rgba(99,179,237,0.18); border-left-color: #63b3ed; }
  .swap-btn {
    flex-shrink: 0; width: 38px; height: 38px;
    background: rgba(56,139,253,0.12); border: 1px solid rgba(56,139,253,0.3);
    border-radius: 10px; cursor: pointer; color: #388bfd; font-size: 18px;
    display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  #col-headers {
    display: grid; grid-template-columns: 1fr 1fr;
    background: rgba(255,255,255,0.02); border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .col-header {
    padding: 7px 16px; display: flex; align-items: center; gap: 6px;
    font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600;
  }
  .col-header:first-child { border-right: 1px solid rgba(255,255,255,0.05); color: #388bfd; }
  .col-header:last-child  { color: #4ade80; }
  #messages { flex: 1; overflow-y: auto; padding: 16px 0 8px; }
  .empty-state { text-align: center; padding: 60px 20px; }
  .empty-state .big-flags { font-size: 50px; margin-bottom: 12px; }
  .empty-state p { color: #2d3f5f; font-size: 14px; margin-top: 6px; }
  .msg-row {
    display: grid; grid-template-columns: 1fr 1fr;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .msg-row:nth-child(even) { background: rgba(255,255,255,0.013); }
  .msg-original   { padding: 15px 16px; border-right: 1px solid rgba(255,255,255,0.05); }
  .msg-translation{ padding: 15px 16px; display: flex; align-items: flex-start; gap: 8px; }
  .msg-text-orig  { font-size: 15px; line-height: 1.7; color: #c8d8f0; }
  .msg-text-trans { font-size: 15px; line-height: 1.7; color: #86efac; flex: 1; }
  .msg-error { font-size: 13px; color: #f87171; }
  .replay-btn {
    flex-shrink: 0; margin-top: 2px;
    background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.2);
    border-radius: 8px; width: 28px; height: 28px; cursor: pointer;
    color: #4ade80; font-size: 13px; display: flex; align-items: center; justify-content: center;
  }
  .dots { display: flex; gap: 5px; align-items: center; padding-top: 8px; }
  .dot  { width:6px; height:6px; border-radius:50%; background:#4ade80; opacity:0.6; animation: pulse 1.2s ease-in-out infinite; }
  .dot:nth-child(2){ animation-delay:.2s } .dot:nth-child(3){ animation-delay:.4s }
  #input-bar {
    padding: 12px 16px 20px; border-top: 1px solid rgba(255,255,255,0.07);
    background: rgba(0,0,0,0.3);
  }
  #mic-error { font-size:12px; color:#f87171; margin-bottom:8px; text-align:center; display:none; }
  .input-box {
    display:flex; gap:8px; align-items:flex-end;
    background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.11);
    border-radius:14px; padding:10px 12px;
  }
  #mic-btn {
    flex-shrink:0; width:40px; height:40px; border-radius:12px;
    background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.14);
    cursor:pointer; color:#94a3b8; font-size:18px;
    display:flex; align-items:center; justify-content:center; transition:all 0.2s;
  }
  #mic-btn.recording {
    background:linear-gradient(135deg,#ef4444,#b91c1c); border:none; color:#fff;
    animation:micPulse 1s ease-in-out infinite;
  }
  #text-input {
    flex:1; background:transparent; border:none; outline:none;
    color:#e2eaff; font-size:15px; line-height:1.6;
    resize:none; font-family:inherit; max-height:120px; overflow-y:auto;
  }
  #text-input::placeholder { color:#1e2d44; }
  #send-btn {
    flex-shrink:0; width:40px; height:40px; border-radius:12px;
    background:rgba(255,255,255,0.05); border:none; cursor:not-allowed;
    color:#555; font-size:17px; display:flex; align-items:center; justify-content:center; transition:all 0.2s;
  }
  #send-btn.active { background:linear-gradient(135deg,#388bfd,#1a5ccc); cursor:pointer; color:#fff; box-shadow:0 3px 14px rgba(56,139,253,0.4); }
  .input-hint { margin-top:7px; font-size:11px; color:#1e2d44; text-align:center; }
  ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:4px}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:0.4}50%{transform:scale(1.5);opacity:1}}
  @keyframes micPulse{0%,100%{box-shadow:0 0 18px rgba(239,68,68,0.5)}50%{box-shadow:0 0 28px rgba(239,68,68,0.9)}}
</style>
</head>
<body>

<div id="header">
  <div class="app-title-row">
    <div class="app-icon">🌐</div>
    <div>
      <div class="app-name">Live Interpreter</div>
      <div class="app-sub">VOICE · TEXT · 7 LANGUAGES</div>
    </div>
  </div>
  <div class="lang-bar">
    <div class="lang-picker" id="from-picker">
      <button class="lang-btn" id="from-btn" onclick="toggleMenu('from')">
        <span id="from-flag" style="font-size:22px">🇬🇧</span>
        <div style="flex:1">
          <div class="lang-btn-native" id="from-native">English</div>
          <div class="lang-btn-en"    id="from-en">ENGLISH</div>
        </div>
        <span style="font-size:10px;opacity:0.5">▼</span>
      </button>
      <div class="lang-menu" id="from-menu"></div>
    </div>
    <button class="swap-btn" onclick="swapLangs()">⇄</button>
    <div class="lang-picker" id="to-picker">
      <button class="lang-btn" id="to-btn" onclick="toggleMenu('to')">
        <span id="to-flag" style="font-size:22px">🇸🇦</span>
        <div style="flex:1">
          <div class="lang-btn-native" id="to-native">العربية</div>
          <div class="lang-btn-en"    id="to-en">ARABIC</div>
        </div>
        <span style="font-size:10px;opacity:0.5">▼</span>
      </button>
      <div class="lang-menu right" id="to-menu"></div>
    </div>
  </div>
</div>

<div id="col-headers">
  <div class="col-header"><span id="col-from-flag">🇬🇧</span>&nbsp;<span id="col-from-name">English</span></div>
  <div class="col-header"><span id="col-to-flag">🇸🇦</span>&nbsp;<span id="col-to-name">Arabic</span></div>
</div>

<div id="messages">
  <div class="empty-state" id="empty-state">
    <div class="big-flags" id="empty-flags">🇬🇧 ⇄ 🇸🇦</div>
    <p id="empty-hint">Type or tap the mic to speak in English</p>
    <p>Translation will be spoken aloud automatically</p>
  </div>
</div>

<div id="input-bar">
  <div id="mic-error"></div>
  <div class="input-box">
    <button id="mic-btn" onclick="toggleMic()">🎤</button>
    <textarea id="text-input" rows="1" placeholder="Type in English…"
      oninput="onInput(this)" onkeydown="onKey(event)"></textarea>
    <button id="send-btn" onclick="sendText()">↑</button>
  </div>
  <div class="input-hint">🎤 Tap mic to speak · Enter to send · 🔊 Tap speaker to replay</div>
</div>

<script>
const LANGUAGES = [
  { code:"en", name:"English",  native:"English",  flag:"🇬🇧", rtl:false, bcp:"en-US", tts:"en-US", mm:"en-GB" },
  { code:"ar", name:"Arabic",   native:"العربية",  flag:"🇸🇦", rtl:true,  bcp:"ar-SA", tts:"ar-SA", mm:"ar-SA" },
  { code:"zh", name:"Chinese",  native:"中文",     flag:"🇨🇳", rtl:false, bcp:"zh-CN", tts:"zh-CN", mm:"zh-CN" },
  { code:"tr", name:"Turkish",  native:"Türkçe",   flag:"🇹🇷", rtl:false, bcp:"tr-TR", tts:"tr-TR", mm:"tr-TR" },
  { code:"es", name:"Spanish",  native:"Español",  flag:"🇪🇸", rtl:false, bcp:"es-ES", tts:"es-ES", mm:"es-ES" },
  { code:"ko", name:"Korean",   native:"한국어",   flag:"🇰🇷", rtl:false, bcp:"ko-KR", tts:"ko-KR", mm:"ko-KR" },
  { code:"fr", name:"French",   native:"Français", flag:"🇫🇷", rtl:false, bcp:"fr-FR", tts:"fr-FR", mm:"fr-FR" },
];

let fromIdx=0, toIdx=1, loading=false, recording=false, recognition=null;

// ── FREE TRANSLATION API (MyMemory - no key needed) ─────────────
async function callTranslate(text, from, to) {
  const pair = `${from.mm}|${to.mm}`;
  const url  = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${encodeURIComponent(pair)}`;
  const res  = await fetch(url);
  if (!res.ok) throw new Error('Network error');
  const data = await res.json();
  if (data.responseStatus !== 200) throw new Error(data.responseDetails || 'API error');
  const t = data.responseData.translatedText;
  if (!t) throw new Error('Empty response');
  return t;
}

// ── MENUS ────────────────────────────────────────────────────────
function buildMenus() {
  ['from','to'].forEach(side => {
    const menu   = document.getElementById(side+'-menu');
    const curIdx = side==='from' ? fromIdx : toIdx;
    menu.innerHTML = '';
    LANGUAGES.forEach((l,i) => {
      const d = document.createElement('div');
      d.className = 'lang-opt'+(i===curIdx?' selected':'');
      d.innerHTML = `<span style="font-size:20px">${l.flag}</span><div><div style="font-size:13px;font-weight:500">${l.native}</div><div style="font-size:10px;opacity:0.45">${l.name}</div></div>`;
      d.onclick = () => pickLang(side, i);
      menu.appendChild(d);
    });
  });
}

function updateUI() {
  const f=LANGUAGES[fromIdx], t=LANGUAGES[toIdx];
  document.getElementById('from-flag').textContent   = f.flag;
  document.getElementById('from-native').textContent = f.native;
  document.getElementById('from-en').textContent     = f.name.toUpperCase();
  document.getElementById('to-flag').textContent     = t.flag;
  document.getElementById('to-native').textContent   = t.native;
  document.getElementById('to-en').textContent       = t.name.toUpperCase();
  document.getElementById('col-from-flag').textContent = f.flag;
  document.getElementById('col-from-name').textContent = f.name;
  document.getElementById('col-to-flag').textContent   = t.flag;
  document.getElementById('col-to-name').textContent   = t.name;
  const ef=document.getElementById('empty-flags'), eh=document.getElementById('empty-hint');
  if(ef) ef.textContent=`${f.flag} ⇄ ${t.flag}`;
  if(eh) eh.textContent=`Type or tap the mic to speak in ${f.name}`;
  document.getElementById('text-input').placeholder=`Type in ${f.name}…`;
  document.getElementById('text-input').dir=f.rtl?'rtl':'ltr';
  buildMenus();
}

function toggleMenu(side) {
  const menu=document.getElementById(side+'-menu'), btn=document.getElementById(side+'-btn');
  const other=side==='from'?'to':'from';
  document.getElementById(other+'-menu').classList.remove('show');
  document.getElementById(other+'-btn').classList.remove('open');
  const open=menu.classList.toggle('show');
  btn.classList.toggle('open',open);
}

function pickLang(side,i) {
  if(side==='from'){if(i===toIdx)toIdx=fromIdx;fromIdx=i;}
  else{if(i===fromIdx)fromIdx=toIdx;toIdx=i;}
  document.getElementById(side+'-menu').classList.remove('show');
  document.getElementById(side+'-btn').classList.remove('open');
  clearMessages(); updateUI();
}

function swapLangs(){[fromIdx,toIdx]=[toIdx,fromIdx];clearMessages();updateUI();}

document.addEventListener('click', e=>{
  ['from','to'].forEach(side=>{
    if(!document.getElementById(side+'-picker').contains(e.target)){
      document.getElementById(side+'-menu').classList.remove('show');
      document.getElementById(side+'-btn').classList.remove('open');
    }
  });
});

// ── MESSAGES ─────────────────────────────────────────────────────
function clearMessages(){
  document.getElementById('messages').innerHTML=`
    <div class="empty-state" id="empty-state">
      <div class="big-flags" id="empty-flags">${LANGUAGES[fromIdx].flag} ⇄ ${LANGUAGES[toIdx].flag}</div>
      <p id="empty-hint">Type or tap the mic to speak in ${LANGUAGES[fromIdx].name}</p>
      <p>Translation will be spoken aloud automatically</p>
    </div>`;
}

function addMessage(original) {
  const e=document.getElementById('empty-state'); if(e)e.remove();
  const msgs=document.getElementById('messages');
  const id='msg-'+Date.now();
  const f=LANGUAGES[fromIdx];
  const row=document.createElement('div');
  row.className='msg-row'; row.id=id;
  row.innerHTML=`
    <div class="msg-original">
      <p class="msg-text-orig" style="direction:${f.rtl?'rtl':'ltr'};text-align:${f.rtl?'right':'left'}">${esc(original)}</p>
    </div>
    <div class="msg-translation" id="${id}-t">
      <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>`;
  msgs.appendChild(row);
  msgs.scrollTop=99999;
  return id;
}

function setTranslation(id, text, err){
  const t=LANGUAGES[toIdx], cell=document.getElementById(id+'-t');
  if(!cell)return;
  if(err){ cell.innerHTML=`<p class="msg-error">${esc(err)}</p>`; return; }
  cell.innerHTML=`
    <p class="msg-text-trans" style="direction:${t.rtl?'rtl':'ltr'};text-align:${t.rtl?'right':'left'}">${esc(text)}</p>
    <button class="replay-btn" onclick="speakText(${JSON.stringify(text)},${JSON.stringify(t.tts)})">🔊</button>`;
  document.getElementById('messages').scrollTop=99999;
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── TRANSLATE ────────────────────────────────────────────────────
async function translate(text){
  if(!text.trim()||loading)return;
  loading=true; setSend(false);
  const id=addMessage(text);
  try{
    const result=await callTranslate(text, LANGUAGES[fromIdx], LANGUAGES[toIdx]);
    setTranslation(id, result, null);
    speakText(result, LANGUAGES[toIdx].tts);
  }catch(e){
    setTranslation(id,'','Translation failed. Check your connection and try again.');
  }finally{
    loading=false; checkSend(document.getElementById('text-input').value);
    document.getElementById('text-input').focus();
  }
}

function sendText(){
  const inp=document.getElementById('text-input'), txt=inp.value.trim();
  if(!txt||loading)return;
  inp.value=''; inp.style.height='auto'; checkSend(''); translate(txt);
}
function onKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendText();}}
function onInput(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';checkSend(el.value);}
function checkSend(v){setSend(v.trim().length>0&&!loading);}
function setSend(on){document.getElementById('send-btn').classList.toggle('active',on);}

// ── MIC ──────────────────────────────────────────────────────────
function toggleMic(){recording?stopMic():startMic();}
function startMic(){
  setMicErr('');
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){setMicErr('Speech recognition not supported.');return;}
  recognition=new SR();
  recognition.lang=LANGUAGES[fromIdx].bcp;
  recognition.interimResults=false; recognition.maxAlternatives=1;
  recognition.onresult=e=>{const t=e.results[0][0].transcript;stopMic();translate(t);};
  recognition.onerror=e=>{setMicErr(e.error==='not-allowed'?'Microphone access denied.':'Could not hear. Try again.');stopMic();};
  recognition.onend=()=>stopMic();
  recognition.start(); recording=true;
  document.getElementById('mic-btn').classList.add('recording');
  document.getElementById('text-input').placeholder='Listening…';
}
function stopMic(){
  if(recognition){try{recognition.stop();}catch(e){}recognition=null;}
  recording=false;
  document.getElementById('mic-btn').classList.remove('recording');
  document.getElementById('text-input').placeholder='Type in '+LANGUAGES[fromIdx].name+'…';
}
function setMicErr(m){const e=document.getElementById('mic-error');e.textContent=m;e.style.display=m?'block':'none';}

// ── TTS ───────────────────────────────────────────────────────────
function speakText(text,lang){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang=lang; u.rate=0.95; window.speechSynthesis.speak(u);
}

buildMenus(); updateUI();
</script>
</body>
</html>
